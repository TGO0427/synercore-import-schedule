<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cost Summary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page">

    <h1 class="page-title">Summary</h1>

    <!-- ✅ Shipment context (explicit DB‑bound data) -->
    <p style="margin-bottom: 4px; font-size: 14px;">
      <strong>Shipment Reference:</strong> {{SHIPMENT_REF}}
    </p>
    <p style="margin-bottom: 4px; font-size: 14px;">
      <strong>Supplier:</strong> {{SUPPLIER}}
    </p>
    <p style="margin-bottom: 16px; font-size: 14px;">
      <strong>Total Weight:</strong> {{TOTAL_WEIGHT}} kg
    </p>

    <section class="cost-summary">

      <div class="panel-header">COST SUMMARY</div>

      <div class="hero">
        <div class="label">Total FOB</div>
        <div class="amount-zar">R&nbsp;369&nbsp;771,93</div>
        <div class="amount-usd">US$22&nbsp;315,75</div>
      </div>

      <div class="divider"></div>

      <div class="metrics">

        <div class="metric">
          <div class="metric-label">Total Shipping Cost</div>
          <div class="metric-zar">R&nbsp;33&nbsp;171,93</div>
          <div class="metric-usd">US$2&nbsp;001,93</div>
        </div>

        <div class="metric">
          <div class="metric-label">FOB Cost / KG</div>
          <div class="metric-zar">R&nbsp;18,49</div>
          <div class="metric-usd">US$1,12</div>
        </div>

      </div>

    </section>

  </div>

</body>
</html>
